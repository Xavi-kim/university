<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смена пароля - University Management</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .password-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .password-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .password-header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .password-requirements {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.9em;
        }

        .password-requirements ul {
            margin: 10px 0 0 20px;
            color: #666;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <h1>🎓 Университет</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/">Главная</a></li>
                <li><a href="/catalog">📚 Каталог</a></li>
                <li><a href="/profile">👤 Профиль</a></li>
                <li><a href="/auth/logout">🚪 Выход</a></li>
            </ul>
        </div>
    </nav>

    <div class="password-container">
        <div class="password-header">
            <h1>🔒 Смена пароля</h1>
            <p>Обновите свой пароль для безопасности</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="password-requirements">
            <strong>📋 Требования к паролю:</strong>
            <ul>
                <li>Минимум 6 символов</li>
                <li>Рекомендуется использовать буквы, цифры и спецсимволы</li>
                <li>Не используйте простые пароли (123456, password)</li>
            </ul>
        </div>

        <form method="post" action="/profile/change-password">
            <div class="form-group">
                <label for="currentPassword">Текущий пароль *</label>
                <input type="password"
                       id="currentPassword"
                       name="currentPassword"
                       required
                       placeholder="Введите текущий пароль">
            </div>

            <div class="form-group">
                <label for="newPassword">Новый пароль *</label>
                <input type="password"
                       id="newPassword"
                       name="newPassword"
                       required
                       minlength="6"
                       placeholder="Введите новый пароль">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Подтвердите новый пароль *</label>
                <input type="password"
                       id="confirmPassword"
                       name="confirmPassword"
                       required
                       minlength="6"
                       placeholder="Повторите новый пароль">
            </div>

            <button type="submit" class="btn-submit">🔑 Изменить пароль</button>
            <a href="/profile" class="btn-cancel">❌ Отмена</a>
        </form>
    </div>

    <script>
        // Проверка совпадения паролей на клиенте
        document.querySelector('form').addEventListener('submit', function(e) {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                e.preventDefault();
                alert('Пароли не совпадают!');
                return false;
            }

            if (newPassword.length < 6) {
                e.preventDefault();
                alert('Пароль должен содержать минимум 6 символов!');
                return false;
            }
        });
    </script>
</body>
</html>
