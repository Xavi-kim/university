<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать профиль - University Management</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .edit-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .edit-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .edit-header h1 {
            color: #667eea;
            font-size: 2em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
        }

        .avatar-preview {
            text-align: center;
            margin: 20px 0;
        }

        .avatar-preview img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #667eea;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <h1>🎓 Университет</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/">Главная</a></li>
                <li><a href="/catalog">📚 Каталог</a></li>
                <li><a href="/profile">👤 Профиль</a></li>
                <li><a href="/auth/logout">🚪 Выход</a></li>
            </ul>
        </div>
    </nav>

    <div class="edit-container">
        <div class="edit-header">
            <h1>✏️ Редактировать профиль</h1>
            <p>Обновите свою информацию</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form method="post" action="/profile/update">
            <div class="avatar-preview">
                <img th:src="${user.avatarUrl != null ? user.avatarUrl : 'https://ui-avatars.com/api/?name=' + user.name + '&size=120&background=667eea&color=fff'}"
                     alt="Avatar"
                     id="avatar-preview">
            </div>

            <div class="form-group">
                <label for="name">Имя *</label>
                <input type="text"
                       id="name"
                       name="name"
                       th:value="${user.name}"
                       required
                       placeholder="Ваше полное имя">
            </div>

            <div class="form-group">
                <label for="email">Email (только для просмотра)</label>
                <input type="email"
                       id="email"
                       th:value="${user.email}"
                       disabled
                       style="background: #f5f5f5; cursor: not-allowed;">
                <small style="color: #666;">Email нельзя изменить</small>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Телефон</label>
                <input type="tel"
                       id="phoneNumber"
                       name="phoneNumber"
                       th:value="${user.phoneNumber}"
                       placeholder="+7 (___) ___-__-__">
            </div>

            <div class="form-group">
                <label for="avatarUrl">URL аватара</label>
                <input type="url"
                       id="avatarUrl"
                       name="avatarUrl"
                       th:value="${user.avatarUrl}"
                       placeholder="https://example.com/avatar.jpg"
                       onchange="updateAvatar(this.value)">
                <small style="color: #666;">Вставьте ссылку на изображение</small>
            </div>

            <div class="form-group">
                <label for="bio">О себе</label>
                <textarea id="bio"
                          name="bio"
                          placeholder="Расскажите немного о себе..."
                          th:text="${user.bio}"></textarea>
            </div>

            <button type="submit" class="btn-submit">💾 Сохранить изменения</button>
            <a href="/profile" class="btn-cancel">❌ Отмена</a>
        </form>
    </div>

    <script>
        function updateAvatar(url) {
            const preview = document.getElementById('avatar-preview');
            if (url && url.startsWith('http')) {
                preview.src = url;
            }
        }
    </script>
</body>
</html>
